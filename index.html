<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Target Calculator</title>
<style>
body{font-family:Arial,sans-serif;background:#111827;color:#fff;padding:15px;max-width:700px;margin:auto}
.card{background:#1f2937;border-radius:18px;padding:18px;margin-bottom:18px}
h1{text-align:center}
h2{margin-top:0}
label{display:block;margin-top:10px}
input{width:100%;box-sizing:border-box;padding:12px;border-radius:10px;border:1px solid #555;margin-top:4px;font-size:16px}
.inp{background:#eadcc7;color:#111}
.auto{background:#fff;color:#111;font-weight:bold}
</style>
</head>
<body>

<h1>🎯 Target Calculator</h1>

<div class="card">
<h2>Калькулятор 1</h2>
<label>Цель, $</label><input id="a1" class="inp" type="number">
<label>Средний чек, $</label><input id="a2" class="inp" type="number">
<label>Количество продаж</label><input id="a3" class="auto" readonly>
<label>Конверсия из заявки в продажу (%)</label><input id="a4" class="inp" type="number">
<label>Количество заявок</label><input id="a5" class="auto" readonly>
<label>Цена за заявку, $</label><input id="a6" class="inp" type="number">
<label>Рекламный бюджет, $</label><input id="a7" class="auto" readonly>
</div>

<div class="card">
<h2>Калькулятор 2</h2>
<label>Цель, $</label><input id="b1" class="inp" type="number">
<label>Средний чек, $</label><input id="b2" class="inp" type="number">
<label>Количество продаж</label><input id="b3" class="auto" readonly>
<label>Конверсия из заявки в продажу (%)</label><input id="b4" class="inp" type="number">
<label>Количество заявок</label><input id="b5" class="auto" readonly>
<label>Цена за заявку, $</label><input id="b6" class="auto" readonly>
<label>Рекламный бюджет, $</label><input id="b7" class="inp" type="number">
</div>

<div class="card">
<h2>Калькулятор 3</h2>
<label>Цель, $</label><input id="c1" class="inp" type="number">
<label>Средний чек, $</label><input id="c2" class="inp" type="number">
<label>Количество продаж</label><input id="c3" class="auto" readonly>
<label>Конверсия из заявки в продажу (%)</label><input id="c4" class="auto" readonly>
<label>Количество заявок</label><input id="c5" class="auto" readonly>
<label>Цена за заявку, $</label><input id="c6" class="inp" type="number">
<label>Рекламный бюджет, $</label><input id="c7" class="inp" type="number">
</div>

<script>
function g(id){return parseFloat(document.getElementById(id).value)||0;}
function s(id,val){
 document.getElementById(id).value=(isFinite(val)&&val!==0)?val.toFixed(2):'';
}

function calc(){

let goal=g('a1'),check=g('a2'),conv=g('a4')/100,cpl=g('a6');
let sales=goal/check;
let leads=sales/conv;
let budget=leads*cpl;
s('a3',sales); s('a5',leads); s('a7',budget);

goal=g('b1'); check=g('b2'); conv=g('b4')/100;
let budget2=g('b7');
let sales2=goal/check;
let leads2=sales2/conv;
let cpl2=budget2/leads2;
s('b3',sales2); s('b5',leads2); s('b6',cpl2);

goal=g('c1'); check=g('c2');
let cpl3=g('c6');
let budget3=g('c7');
let sales3=goal/check;
let leads3=budget3/cpl3;
let conv3=(sales3/leads3)*100;
s('c3',sales3); s('c4',conv3); s('c5',leads3);
}

document.querySelectorAll('input').forEach(el=>el.addEventListener('input',calc));
</script>

</body>
</html>
